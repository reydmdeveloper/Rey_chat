{% extends "base.html" %}

{% block title %}Register - REYDM Chat{% endblock %}

{% block extra_head %}
<style>
    .register-wrapper {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        animation: fadeIn 0.5s ease-out;
    }
    .logo {
        text-align: center;
        margin-bottom: 25px;
    }
    .logo i {
        font-size: 40px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
    }
    .logo h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 1px;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}

{% block content %}
<div class="glass-panel register-wrapper">
    <div class="logo">
        <img src="/Images/REYDM_LOGO.png" alt="REYDM Logo" style="width: 80px; height: auto; margin-bottom: 10px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));">
        <h1>Create Account</h1>
    </div>
    <form method="POST" action="/register" id="registerForm">
        <div class="input-group">
            <input type="text" name="full_name" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" id="regPassword" placeholder="Password (min. 6 chars)" minlength="6" required>
        </div>
        <div class="input-group">
            <input type="password" name="confirm_password" id="regConfirmPassword" placeholder="Confirm Password" minlength="6" required>
        </div>
        <button type="submit" class="btn-primary">Register</button>
        <div style="text-align: center; margin-top: 20px;">
            <span style="color: var(--text-muted); font-size: 14px;">Already have an account? </span>
            <a href="/login" style="color: var(--primary); font-size: 14px; font-weight: 600; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--primary)'">Sign In</a>
        </div>
    </form>
</div>

<script>
    const password = document.getElementById("regPassword");
    const confirmPassword = document.getElementById("regConfirmPassword");

    function validatePassword(){
        if(password.value != confirmPassword.value) {
            confirmPassword.setCustomValidity("Passwords Don't Match");
        } else {
            confirmPassword.setCustomValidity('');
        }
    }

    password.onchange = validatePassword;
    confirmPassword.onkeyup = validatePassword;
</script>
{% endblock %}
